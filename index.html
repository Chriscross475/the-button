<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#f4f4f2" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <title>The Button</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #f4f4f2;
        overscroll-behavior: none;
      }
      body {
        position: fixed;
        inset: 0;
        font-family: Georgia, "Times New Roman", serif;
      }
      canvas#scene {
        display: block;
        width: 100%;
        height: 100%;
      }

      /* Center crosshair dot — helps line up the look-cone with the button. */
      #crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 5px;
        height: 5px;
        margin: -2.5px 0 0 -2.5px;
        border-radius: 50%;
        background: rgba(40, 40, 40, 0.45);
        pointer-events: none;
        z-index: 8;
      }

      /* Floating world-anchored interact prompt. */
      #interact-prompt {
        position: fixed;
        transform: translate(-50%, -50%);
        padding: 6px 14px;
        border: 1px solid rgba(30, 30, 30, 0.35);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.7);
        color: #1a1a1a;
        font-size: 14px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        white-space: nowrap;
        pointer-events: none;
        display: none;
        z-index: 9;
        backdrop-filter: blur(2px);
      }

      /* Stanley-Parable-style narrator line. */
      #narrator {
        position: fixed;
        left: 50%;
        bottom: 12%;
        transform: translateX(-50%);
        max-width: min(80vw, 720px);
        text-align: center;
        color: #1a1a1a;
        font-size: clamp(18px, 2.6vw, 26px);
        font-style: italic;
        line-height: 1.4;
        text-shadow: 0 1px 10px rgba(255, 255, 255, 0.8);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.6s ease;
        z-index: 12;
      }

      /* First-run hint, dismissed on first interaction. */
      #hint {
        position: fixed;
        left: 50%;
        bottom: 6%;
        transform: translateX(-50%);
        color: rgba(30, 30, 30, 0.55);
        font-size: 14px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: center;
        pointer-events: none;
        transition: opacity 0.8s ease;
        z-index: 11;
        display: none; /* shown by game.start() after BEGIN */
      }

      /* Objective counter (e.g. duck quota). */
      #counter {
        position: fixed;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        color: #1a1a1a;
        font-size: 18px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        text-shadow: 0 1px 8px rgba(255, 255, 255, 0.7);
        pointer-events: none;
        display: none;
        z-index: 11;
      }

      /* On-screen menu/pause button (top-left). Shown once the game starts. */
      #menu-button {
        position: fixed;
        top: 14px;
        left: 14px;
        width: 40px;
        height: 40px;
        display: none;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.5);
        border: 1px solid rgba(30, 30, 30, 0.3);
        color: #222;
        font-size: 20px;
        cursor: pointer;
        z-index: 13;
        -webkit-tap-highlight-color: transparent;
      }

      /* Level-transition fade. */
      #fade {
        position: fixed;
        inset: 0;
        background: #000;
        opacity: 0;
        pointer-events: none;
        z-index: 50;
      }

      /* Death / spectator overlay. */
      /* Small restart prompt at the bottom — NOT a full-screen overlay, so the
         crime-scene body on the ground stays visible. */
      #death {
        position: fixed;
        left: 50%;
        bottom: 9%;
        transform: translateX(-50%);
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        color: #f2f2f2;
        text-align: center;
        opacity: 0;
        transition: opacity 0.5s ease;
        z-index: 40;
        cursor: pointer;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.85);
      }
      #death .big {
        font-size: clamp(18px, 3vw, 28px);
        font-style: italic;
        letter-spacing: 0.06em;
      }
      #death .sub {
        font-size: 13px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <canvas id="scene"></canvas>
    <div id="crosshair"></div>
    <div id="menu-button">☰</div>
    <div id="counter"></div>
    <div id="interact-prompt"></div>
    <div id="narrator"></div>
    <div id="hint">click to look · WASD or joystick to move · find the button</div>
    <div id="death">
      <div class="big">you are dead</div>
      <div class="sub">press R / tap to restart</div>
    </div>
    <div id="fade"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // PWA: register only in production (dev serves at /, prod at /button/).
      if ('serviceWorker' in navigator && location.pathname.startsWith('/button/'))
        addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    </script>
  </body>
</html>
